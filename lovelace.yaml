project:
  name: "LegacyMonolith"
  java_version: 11

analysis:
  ignore_paths:
    - "**/generated/**"
    - "**/test/**"
    - "**/legacy/deprecated/**"

  # # Force specific classes to stay together (Manual override)
  # constraints:
  #   - group: "AuthenticationCore"
  #     classes: ["com.myapp.security.*", "com.myapp.user.UserEntity"]

  # Clustering configuration
  clustering:
    algorithm: "louvain"
    resolution: 0.3 # Lower = fewer, larger clusters (default is 1.0)

